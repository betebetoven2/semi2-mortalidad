site_name: Plataforma Analítica de Mortalidad
site_description: Documentación de gobernanza, linaje y ética — Seminario de Sistemas 2 | USAC 2026
site_author: Grupo 3
docs_dir: docs

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Inicio: index.md
  - Fuentes de Datos:
      - Catálogo de Fuentes: fuentes/index.md
      - RENAP — Solicitud Formal: fuentes/renap.md
  - Linaje de Datos:
      - Arquitectura del Pipeline: linaje/index.md
      - Diccionario de Tablas: linaje/tablas.md
  - Capa Stage:
      - Información General: stage/index.md
      - Hallazgos del EDA: stage/hallazgos_eda.md
      - Reglas de Conformidad: stage/reglas_stage.md
      - Modelo Dimensional: stage/modelo_dw.md
  - Inteligencia Analítica:
      - Visión General: analitica/index.md
      - Modelo de ML: analitica/modelo_ml.md
      - Visualización e Interoperabilidad BI: analitica/bi_interoperabilidad.md
      - Análisis y Recomendaciones: analitica/analisis_recomendaciones.md
  - Ética y Gobernanza:
      - Marco Ético: etica/index.md
      - Plan de Anonimización: etica/anonimizacion.md

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
